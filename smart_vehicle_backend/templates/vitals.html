{% extends "layout.html" %}
{% set header = "Vitals" %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
  <div class="lg:col-span-2 p-5 rounded-2xl bg-[#111827] border border-[#1F2937]">
    <div class="font-semibold">Wearable Vitals</div>
    <div class="mt-3 overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="text-slate-400">
          <tr class="border-b border-[#1F2937]">
            <th class="text-left py-2">Time</th>
            <th class="text-left py-2">Patient</th>
            <th class="text-left py-2">HR</th>
            <th class="text-left py-2">Steps</th>
            <th class="text-left py-2">Calories</th>
            <th class="text-left py-2">Sleep</th>
            <th class="text-left py-2">Source</th>
            <th class="text-left py-2">Action</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <div class="p-5 rounded-2xl bg-[#111827] border border-[#1F2937] space-y-4">
    <div>
      <div class="font-semibold">Add Manually</div>

      <div class="mt-3 space-y-2 text-sm">
        <input id="patient_id" class="w-full px-3 py-2 rounded-xl bg-white/5 border border-[#1F2937]" placeholder="Patient ID" />
        <input id="heart_rate" class="w-full px-3 py-2 rounded-xl bg-white/5 border border-[#1F2937]" placeholder="Heart Rate" />
        <input id="steps" class="w-full px-3 py-2 rounded-xl bg-white/5 border border-[#1F2937]" placeholder="Steps" />
        <input id="calories" class="w-full px-3 py-2 rounded-xl bg-white/5 border border-[#1F2937]" placeholder="Calories" />
        <input id="sleep" class="w-full px-3 py-2 rounded-xl bg-white/5 border border-[#1F2937]" placeholder="Sleep (e.g. 8.00)" />
        <input id="timestamp" type="datetime-local" class="w-full px-3 py-2 rounded-xl bg-white/5 border border-[#1F2937]" />
      </div>

      <button id="addManual" class="mt-4 w-full px-4 py-2 rounded-xl bg-[#22C55E] text-black font-semibold hover:opacity-90">
        Add manual record
      </button>
    </div>

    <div>
      <div class="font-semibold">Fetch Latest from API</div>
      <div class="text-xs text-slate-400 mt-2">
        Pull the latest wearable record from the external API and save it locally.
      </div>

      <button id="fetchLatest" class="mt-4 w-full px-4 py-2 rounded-xl bg-[#7C3AED] hover:opacity-90">
        Fetch latest API data
      </button>
    </div>
  </div>
</div>

<script>
  const rows = document.getElementById("rows");

  function rowHtml(v){
    const t = new Date(v.timestamp).toLocaleString();
    return `
      <tr class="border-b border-[#1F2937]">
        <td class="py-2">${t}</td>
        <td class="py-2">${v.patient_id ?? ""}</td>
        <td class="py-2">${v.heart_rate ?? ""}</td>
        <td class="py-2">${v.steps ?? ""}</td>
        <td class="py-2">${v.calories ?? ""}</td>
        <td class="py-2">${v.sleep ?? ""}</td>
        <td class="py-2">${v.source ?? ""}</td>
        <td class="py-2">
          <button onclick="deleteVital(${v.id})" class="px-3 py-1 rounded-lg bg-red-500/20 text-red-200 border border-red-500/30 text-sm">
            Delete
          </button>
        </td>
      </tr>
    `;
  }

  async function load(){
    const r = await fetch("/api/vitals", {cache:"no-store"});
    const j = await r.json();
    rows.innerHTML = j.map(rowHtml).join("");
  }

  async function deleteVital(id){
    await fetch(`/api/vitals/${id}`, {method:"DELETE"});
    load();
  }

  document.getElementById("addManual").onclick = async () => {
    const payload = {
      patient_id: document.getElementById("patient_id").value || 20,
      heart_rate: document.getElementById("heart_rate").value || 0,
      steps: document.getElementById("steps").value || 0,
      calories: document.getElementById("calories").value || 0,
      sleep: document.getElementById("sleep").value || "0.00",
      timestamp: document.getElementById("timestamp").value || new Date().toISOString()
    };

    await fetch("/api/vitals", {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });

    load();
  };

  document.getElementById("fetchLatest").onclick = async () => {
    await fetch("/api/vitals/fetch_latest", {
      method:"POST",
      headers: {"Content-Type":"application/json"}
    });
    load();
  };

  load();
</script>
{% endblock %}
