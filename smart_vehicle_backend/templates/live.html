{% extends "layout.html" %}
{% set header = "Live Monitoring" %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
  <div class="lg:col-span-2 p-4 rounded-2xl bg-[#111827] border border-[#1F2937]">
    <div class="flex items-center justify-between">
      <div class="font-semibold">Camera Stream</div>
      <div id="pill" class="px-3 py-1 rounded-full bg-white/5 text-sm">OK</div>
    </div>

    <img
      id="stream"
      class="mt-3 w-full rounded-2xl border border-[#1F2937]"
      src="/snapshot"
      alt="stream"
    />
  </div>

  <div class="p-4 rounded-2xl bg-[#111827] border border-[#1F2937]">
    <div class="font-semibold">Alert Panel</div>
    <div id="reason" class="text-xs text-slate-400 mt-2">—</div>

    <div class="mt-4 flex gap-2">
      <button
        id="enableAudio"
        class="px-4 py-2 rounded-xl bg-[#7C3AED] hover:opacity-90"
      >
        Enable alarm audio
      </button>
      <button
        id="stopAlarm"
        class="px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10"
      >
        Stop alarm
      </button>
      <a class="px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10" href="/falls">Fall events</a>
    </div>

    <audio id="alarm" src="/static/alarm.mp3" preload="auto"></audio>

    <div class="mt-4 text-xs text-slate-400">
      Note: Browsers require user interaction before playing audio.
    </div>
  </div>
</div>

<script>
  const pill = document.getElementById("pill");
  const reason = document.getElementById("reason");
  const alarm = document.getElementById("alarm");
  const btnEnable = document.getElementById("enableAudio");
  const btnStop = document.getElementById("stopAlarm");
  const stream = document.getElementById("stream");

  let audioEnabled = false;
  let lastEventId = 0;

  async function unlockAudio() {
    try {
      try {
        const r = await fetch("/status", { cache: "no-store" });
        const j = await r.json();
        lastEventId = j.event_id ?? lastEventId;
      } catch (e) {}

      alarm.pause();
      alarm.currentTime = 0;
      alarm.muted = true;
      alarm.volume = 0.0;
      alarm.load();

      await alarm.play();
      alarm.pause();
      alarm.currentTime = 0;

      audioEnabled = true;

      btnEnable.textContent = "Audio enabled";
      btnEnable.className =
        "px-4 py-2 rounded-xl bg-green-500/20 text-green-200 border border-green-500/30";
    } catch (e) {
      console.log("unlockAudio failed:", e);
      btnEnable.textContent = "Click again to enable";
    }
  }

  btnEnable.onclick = unlockAudio;

  btnStop.onclick = () => {
    alarm.pause();
    alarm.currentTime = 0;
  };

  function refreshFrame() {
    stream.src = "/snapshot?ts=" + Date.now();
    setTimeout(refreshFrame, 120);
  }
  refreshFrame();

  async function playAlarmOnce() {
    if (!audioEnabled) return;

    try {
      alarm.pause();
      alarm.currentTime = 0;
      alarm.muted = false;
      alarm.volume = 1.0;
      await alarm.play();
    } catch (e) {
      console.log("alarm play failed:", e);
    }
  }

  async function pollStatus() {
    try {
      const r = await fetch("/status", { cache: "no-store" });
      const j = await r.json();

      const msg = j.msg ?? "—";
      const posture = j.posture ?? "Unknown";
      const fps = j.fps ?? 0;

      reason.textContent = `msg=${msg} | posture=${posture} | fps≈${fps}`;

      if (j.fall) {
        pill.textContent = "FALL ALERT";
        pill.className =
          "px-3 py-1 rounded-full text-sm bg-red-500/20 text-red-200 border border-red-500/30";
      } else {
        pill.textContent = "OK";
        pill.className =
          "px-3 py-1 rounded-full bg-green-500/20 text-green-200 border border-green-500/30 text-sm";
      }

      const eid = j.event_id ?? 0;
      const confirmed = !!j.fall_confirmed;
      if (audioEnabled && confirmed && eid && eid !== lastEventId) {
        lastEventId = eid;
        playAlarmOnce();
      }
    } catch (e) {}

    setTimeout(pollStatus, 250);
  }

  pollStatus();
</script>
{% endblock %}
